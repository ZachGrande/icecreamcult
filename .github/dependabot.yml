version: 2
updates:

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      version-updates-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"